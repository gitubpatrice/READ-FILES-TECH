name: read_files_tech
description: "Couteau suisse Android pour vos fichiers : explorateur, lecteur universel, scanner, OCR, coffre-fort, conversion, anti-EXIF — 100 % local."
publish_to: 'none'
version: 2.10.1+2101

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Code partagé Files Tech
  files_tech_core:
    path: ../files_tech_core

  # Fichiers
  file_picker: ^11.0.0
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  # share_plus 13 + package_info_plus 10 exigent win32 ^6, mais file_picker 11
  # déclare encore win32 ^5.9. Override impossible (file_picker Windows utilise
  # API win32 5.x). On reste sur share_plus 10 / package_info_plus 9.
  share_plus: ^10.0.3
  shared_preferences: ^2.3.2

  # Formats documents
  excel: ^4.0.6              # XLSX / ODS
  csv: ^8.0.0                # CSV
  archive: ^3.6.1            # DOCX / ODT (ZIP + XML)
  webview_flutter: ^4.10.0   # rendu HTML

  # Visualisation code
  flutter_highlight: ^0.7.0  # syntax highlighting

  # Outil couleur
  flutter_colorpicker: ^1.1.0

  # Markdown rendu (gpt_markdown : remplaçant maintenu de flutter_markdown archivé)
  gpt_markdown: ^1.0.0

  # Hash fichier
  crypto: ^3.0.3

  # Export PDF + viewer
  syncfusion_flutter_pdf: ^33.2.4
  syncfusion_flutter_pdfviewer: ^33.2.4

  # HTTP (utilisé par UpdateService pour GitHub Releases API)
  http: ^1.2.0

  # Dates
  intl: ^0.20.0

  # Liens externes (mailto / https) pour Aide & Support
  url_launcher: ^6.3.1

  # OCR on-device (texte depuis images)
  google_mlkit_text_recognition: ^0.15.1

  # Scanner de documents (caméra + détection bords + perspective + PDF)
  google_mlkit_document_scanner: ^0.4.1

  # EPUB : extraction de texte / chapitres
  html: ^0.15.4

  # Manipulation images (compression, conversion)
  image: ^4.1.3
  image_picker: ^1.1.2

  # Utilitaires path / pointycastle pour PBKDF2
  pointycastle: ^4.0.0
  path: ^1.9.0

  # Version de l'app — source unique depuis pubspec
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/legal/
