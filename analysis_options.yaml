# Lints durcis (v2.12.0) — alignement avec Pass Tech / Notes Tech.
include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Style + immutabilité
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true
    prefer_single_quotes: true
    require_trailing_commas: true

    # Sécurité / robustesse
    # avoid_dynamic_calls / unawaited_futures restent désactivés : trop de
    # fire-and-forget intentionnels (SharedPreferences setBool dans handlers
    # UI). À adopter progressivement au cas-par-cas.
    cancel_subscriptions: true
    close_sinks: true

    # Lisibilité
    sort_pub_dependencies: false # pubspec déjà groupé thématiquement

analyzer:
  errors:
    # Erreurs vraies → restent erreurs ; les warnings restent warnings.
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
